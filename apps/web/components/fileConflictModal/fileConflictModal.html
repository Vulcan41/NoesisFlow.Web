<div id="file-conflict-modal" class="file-conflict-modal hidden">
    <div class="file-conflict-modal-backdrop"></div>

    <div class="file-conflict-modal-card" role="dialog" aria-modal="true" aria-labelledby="file-conflict-modal-title">
        <div class="file-conflict-modal-title" id="file-conflict-modal-title">
            File already exists
        </div>

        <div class="file-conflict-modal-message" id="file-conflict-modal-message">
            A file with this name already exists.
        </div>

        <div class="file-conflict-modal-actions">
            <button id="file-conflict-modal-cancel" class="file-conflict-btn file-conflict-btn-secondary" type="button">
                Cancel
            </button>

            <button id="file-conflict-modal-rename" class="file-conflict-btn file-conflict-btn-secondary" type="button">
                Keep both
            </button>

            <button id="file-conflict-modal-replace" class="file-conflict-btn file-conflict-btn-danger" type="button">
                Replace
            </button>
        </div>
    </div>
</div>
