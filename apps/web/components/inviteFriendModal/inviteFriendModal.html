<div id="invite-friend-modal" class="invite-friend-modal hidden">
    <div class="invite-friend-backdrop"></div>

    <div class="invite-friend-panel">
        <div class="invite-friend-header">
            <div>
                <h2>Invite friends</h2>
                <p>Invite friends and review pending invites.</p>
            </div>

            <button id="invite-friend-close-btn" class="invite-friend-close-btn" type="button">
                ✕
            </button>
        </div>

        <div class="invite-friend-body">
            <div id="invite-friend-pending-section"></div>
            <div id="invite-friend-invite-section"></div>
        </div>

        <div class="invite-friend-footer">
            <button
                    id="invite-friend-invite-selected-btn"
                    class="invite-friend-toolbar-btn invite-friend-toolbar-btn-primary"
                    type="button"
                    disabled
            >
                Invite selected
            </button>

            <button id="invite-friend-cancel-btn" class="invite-friend-cancel-btn" type="button">
                Close
            </button>
        </div>
    </div>
</div>
