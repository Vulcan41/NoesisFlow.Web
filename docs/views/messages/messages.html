<div id="messages-page">

    <!-- LEFT: CONVERSATION LIST -->
    <div id="conversation-list">

        <div id="conversations-empty">
            Δεν υπάρχουν συνομιλίες ακόμη<br>
            Ξεκινήστε μια συνομιλία από το προφίλ μιας επαφής
        </div>

        <div id="conversations-container">
            <!-- conversation rows will be inserted here -->
        </div>

    </div>


    <!-- RIGHT: CHAT PANEL -->
    <div id="chat-panel">

        <div id="chat-empty">
            Επιλέξτε μια συνομιλία
        </div>

        <div id="chat-container">

            <!-- CHAT HEADER -->
            <div id="chat-header"></div>

            <!-- MESSAGES -->
            <div id="chat-messages"></div>

            <!-- MESSAGE INPUT -->
            <div id="chat-input-area">

                <input
                        id="chat-input"
                        type="text"
                        placeholder="Γράψτε μήνυμα..."
                >

                <button id="send-message">
                    Αποστολή
                </button>

            </div>

        </div>

    </div>

</div>
