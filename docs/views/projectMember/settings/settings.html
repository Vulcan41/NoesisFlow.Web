<section class="project-member-settings-page">
  <div class="project-member-settings-shell">

    <div class="project-member-settings-header">
      <div class="project-member-settings-header-text">
        <p class="project-member-settings-kicker">Project settings</p>
        <h1 class="project-member-settings-title">Member settings</h1>
        <p class="project-member-settings-subtitle">
          Manage your membership in this project.
        </p>
      </div>
    </div>

    <div id="project-member-settings-error" class="project-member-settings-error hidden"></div>
    <div id="project-member-settings-success" class="project-member-settings-success hidden"></div>

    <section class="project-member-settings-zone project-member-settings-zone-danger">
      <div class="project-member-settings-zone-header">
        <h2>Danger zone</h2>
        <p>Leaving the project will remove your access immediately.</p>
      </div>

      <div class="project-member-settings-danger-actions">
        <button
                id="project-member-leave-btn"
                class="project-member-leave-btn"
                type="button"
        >
          Leave Project
        </button>
      </div>
    </section>

  </div>
</section>
