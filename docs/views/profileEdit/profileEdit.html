<div id="profile-edit-page">

    <!-- TOP -->
    <div id="top-area">
        <h2>Επεξεργασία Προφίλ</h2>
    </div>

    <!-- MIDDLE CONTENT -->
    <div id="profile-content">

        <div id="profile-main">

            <!-- LEFT: AVATAR -->
            <div id="avatar-section">
                <label></label>

                <label id="avatar-upload">
                    <img id="edit-avatar-preview" src="assets/user_icon_2.jpg">
                    <input type="file" id="edit-avatar-input" accept="image/*">
                    <span id="avatar-overlay">Change</span>
                </label>
            </div>

            <!-- RIGHT: FORM FIELDS -->
            <div id="profile-fields">

                <div class="edit-field">
                    <label>Όνομα</label>
                    <input id="edit-fullname">
                </div>

                <div class="edit-field">
                    <label>Όνομα Χρήστη</label>
                    <input id="edit-username">
                </div>

                <div class="edit-field">
                    <label>Ιδιότητα</label>
                    <textarea id="edit-bio"></textarea>
                </div>

            </div>

        </div>

    </div>

    <!-- BOTTOM STRIP -->
    <div id="profile-actions">
        <button id="cancel-edit">Ακύρωση</button>
        <button id="save-edit">Αποθήκευση</button>
    </div>

</div>
