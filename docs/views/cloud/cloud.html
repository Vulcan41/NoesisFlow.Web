<div class="cloud-panel active">

    <section class="cloud-top">

        <div class="cloud-upload-card">

            <div class="cloud-top-data">

                <div class="cloud-storage-usage">

                    <div class="cloud-storage-ring-block">
                        <div class="cloud-storage-ring" id="cloudStorageRing" style="--progress: 0%;">
                            <div class="cloud-storage-ring-inner">
                                <span id="cloudStoragePercent">0%</span>
                            </div>
                        </div>
                    </div>

                    <div class="cloud-storage-info">
                        <div class="cloud-storage-label">Storage</div>
                        <div class="cloud-storage-values" id="cloudStorageText">0 MB / 0.5 GB</div>
                        <div class="cloud-storage-foot">
                            Personal cloud usage
                        </div>
                    </div>

                </div>

            </div>

            <div class="cloud-top-upload">

                <div class="cloud-upload-left">

                    <div class="cloud-upload-icon">
                        <img src="assets/cloud_4.png" alt="Cloud">
                    </div>

                    <div class="cloud-upload-text">
                        <div class="cloud-upload-subtitle">
                            <span class="cloud-upload-select">Select</span>
                            a file from your device and store it in your cloud space
                        </div>
                    </div>

                </div>

                <div class="cloud-upload-actions">
                    <input type="file" id="fileInput">

                    <button id="uploadBtn" type="button">
                        Upload File
                    </button>
                </div>

            </div>

        </div>

    </section>

    <section class="cloud-bottom">

        <div class="cloud-files-shell">

            <div class="cloud-files-toolbar">
                <div class="cloud-files-count" id="cloudFilesCount">
                    0 files
                </div>
            </div>

            <div id="fileList" class="cloud-file-list"></div>

        </div>

    </section>

</div>
