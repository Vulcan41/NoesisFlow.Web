<div id="register-overlay">

    <div id="register-modal">

        <h2>Δημιουργία Λογαριασμού</h2>

        <!-- AVATAR -->

        <div class="register-avatar-section">

            <img
                    id="register-avatar-preview"
                    src="assets/avatar.png"
                    class="register-avatar"
            >

            <input
                    type="file"
                    id="register-avatar-input"
                    accept="image/*"
            >

        </div>

        <!-- USERNAME -->

        <input
                id="register-username"
                type="text"
                placeholder="Username"
                autocomplete="off"
        >

        <!-- FULL NAME -->

        <input
                id="register-fullname"
                type="text"
                placeholder="Full Name"
                autocomplete="off"
        >

        <!-- BIO -->

        <textarea
                id="register-bio"
                placeholder="Bio"
                rows="2"
        ></textarea>

        <!-- EMAIL -->

        <input
                id="register-email"
                type="email"
                placeholder="Email"
                autocomplete="off"
        >

        <!-- PASSWORD -->

        <input
                id="register-password"
                type="password"
                placeholder="Password"
                autocomplete="new-password"
        >

        <div class="register-buttons">

            <button id="register-submit">
                Δημιουργία Λογαριασμού
            </button>

            <button id="register-cancel">
                Ακύρωση
            </button>

        </div>

    </div>

</div>
