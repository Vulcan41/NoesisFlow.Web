<div id="register-overlay">

    <div id="register-modal">

        <h2>Δημιουργία Λογαριασμού</h2>

        <!-- AVATAR -->

        <div id="avatar-section">

            <label id="avatar-upload">

                <div id="avatar-image-wrapper">
                    <img id="register-avatar-preview" src="assets/avatar.png">
                    <div id="avatar-mask"></div>
                </div>

                <div id="avatar-overlay">Αλλαγή</div>

                <input type="file" id="register-avatar-input" accept="image/*">

            </label>

        </div>

        <!-- ACCOUNT INFO -->

        <h3 class="register-section">Στοιχεία Λογαριασμού</h3>

        <input
                id="register-email"
                type="email"
                placeholder="Email"
                autocomplete="off"
        >

        <input
                id="register-password"
                type="password"
                placeholder="Κωδικός Πρόσβασης"
                autocomplete="new-password"
        >

        <!-- PROFILE INFO -->

        <h3 class="register-section">Στοιχεία Προφίλ</h3>

        <input
                id="register-username"
                type="text"
                placeholder="Όνομα Χρήστη"
                autocomplete="off"
        >

        <input
                id="register-fullname"
                type="text"
                placeholder="Όνομα"
                autocomplete="off"
        >

        <input
                id="register-bio"
                type="text"
                placeholder="Ειδικότητα"
                autocomplete="off"
        >



        <!-- BUTTONS -->

        <div class="auth-buttons">

            <button class="glow-btn" id="register-submit">
                <span>Δημιουργία</span>
            </button>

            <button class="glow-btn" id="register-cancel">
                <span>Ακύρωση</span>
            </button>

        </div>

    </div>

</div>
